<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="48" fill="url(#bg)"/>

  <!-- Constellation dots -->
  <circle cx="92" cy="88" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="200" cy="60" r="5" fill="url(#accent2)" opacity="0.6"/>
  <circle cx="308" cy="88" r="5" fill="url(#accent)" opacity="0.8"/>
  <circle cx="320" cy="180" r="4" fill="url(#accent2)" opacity="0.5"/>
  <circle cx="80" cy="180" r="4" fill="url(#accent2)" opacity="0.5"/>
  <circle cx="200" cy="340" r="6" fill="url(#accent2)" opacity="0.9"/>

  <!-- Constellation lines -->
  <line x1="92" y1="88" x2="200" y2="60" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="60" x2="308" y2="88" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="308" y1="88" x2="320" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="88" x2="80" y2="180" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="180" x2="92" y2="88" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="60" x2="200" y2="340" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>

  <!-- Central stylized "M" (SkyMetron) -->
  <path d="M120 260 L160 160 L200 220 L240 160 L280 260"
        stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Neural circuit dots along M -->
  <circle cx="160" cy="160" r="7" fill="url(#accent)" opacity="0.9"/>
  <circle cx="200" cy="220" r="7" fill="url(#accent2)" opacity="0.9"/>
  <circle cx="240" cy="160" r="7" fill="url(#accent)" opacity="0.9"/>

  <!-- Orbital rings -->
  <ellipse cx="200" cy="200" rx="140" ry="40" stroke="url(#accent)" stroke-width="0.5" opacity="0.15" transform="rotate(-15 200 200)"/>
  <ellipse cx="200" cy="200" rx="100" ry="28" stroke="url(#accent2)" stroke-width="0.5" opacity="0.1" transform="rotate(20 200 200)"/>

  <!-- Small orbital nodes -->
  <circle cx="72" cy="146" r="3" fill="url(#accent)" opacity="0.4"/>
  <circle cx="328" cy="254" r="3" fill="url(#accent2)" opacity="0.4"/>
</svg>
