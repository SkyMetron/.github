<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="72%">
      <stop offset="0%" stop-color="#30353b"/>
      <stop offset="42%" stop-color="#171b20"/>
      <stop offset="100%" stop-color="#06080b"/>
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="68%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.68"/>
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6a8c" stop-opacity="1"/>
      <stop offset="28%" stop-color="#ff2658" stop-opacity="0.95"/>
      <stop offset="62%" stop-color="#af0d2e" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="18%" stop-color="#ff7da0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ff3b6a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e5e8"/>
      <stop offset="12%" stop-color="#8b9299"/>
      <stop offset="32%" stop-color="#30353b"/>
      <stop offset="55%" stop-color="#12161b"/>
      <stop offset="74%" stop-color="#676e75"/>
      <stop offset="100%" stop-color="#0f1318"/>
    </linearGradient>

    <linearGradient id="metal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8cdd2"/>
      <stop offset="100%" stop-color="#3a4046"/>
    </linearGradient>

    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#262b31"/>
      <stop offset="35%" stop-color="#0f1318"/>
      <stop offset="70%" stop-color="#454c53"/>
      <stop offset="100%" stop-color="#090b0f"/>
    </linearGradient>

    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7ea0"/>
      <stop offset="50%" stop-color="#ff184f"/>
      <stop offset="100%" stop-color="#ff7ea0"/>
    </linearGradient>

    <linearGradient id="metalShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.75"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.8"/>
    </filter>

    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.07"/>
      </feComponentTransfer>
    </filter>

    <clipPath id="round">
      <rect width="1024" height="1024" rx="72"/>
    </clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- subtle industrial scratches -->
    <g opacity="0.16" stroke="#d8dde2" stroke-linecap="round">
      <path d="M68 92C136 72 190 48 250 18" stroke-width="1.6"/>
      <path d="M214 66C294 42 358 24 432 14" stroke-width="1.1"/>
      <path d="M650 30C724 52 790 98 872 174" stroke-width="1.2"/>
      <path d="M806 76C864 34 924 8 982 4" stroke-width="1.2"/>
      <path d="M54 232C112 206 160 172 224 128" stroke-width="1.1"/>
      <path d="M726 188C800 164 874 124 974 74" stroke-width="1.1"/>
      <path d="M72 834C126 772 158 720 188 666" stroke-width="1.2"/>
      <path d="M836 826C894 776 940 732 982 686" stroke-width="1.2"/>
    </g>

    <g opacity="0.22" filter="url(#grain)">
      <rect width="1024" height="1024" fill="#ffffff"/>
    </g>

    <!-- main device -->
    <g transform="translate(512 508)">
      <circle r="382" fill="#0e1115" stroke="#272d33" stroke-width="18"/>
      <circle r="366" fill="none" stroke="url(#metal)" stroke-width="12" opacity="0.92"/>
      <circle r="340" fill="#11151a" stroke="#525960" stroke-width="10"/>
      <circle r="306" fill="#0d1014" stroke="#262b31" stroke-width="8"/>

      <!-- outer armor segments -->
      <g>
        <path d="M-238 -334h476l-32 94h-412z" fill="url(#metal2)" stroke="#0a0c0f" stroke-width="8"/>
        <path d="M-218 -324h436" stroke="#fafcff" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
        <circle cx="-138" cy="-274" r="12" fill="#1c2025" stroke="#70777f" stroke-width="5"/>
        <circle cx="138" cy="-274" r="12" fill="#1c2025" stroke="#70777f" stroke-width="5"/>
        <path d="M-18 -260l18 -28 18 28-18 12z" fill="#ff5b88" filter="url(#glow)"/>
      </g>

      <g filter="url(#glow)">
        <path d="M-304 -128A324 324 0 0 1 -248 -262" stroke="url(#neon)" stroke-width="14" stroke-linecap="round"/>
        <path d="M304 -128A324 324 0 0 0 248 -262" stroke="url(#neon)" stroke-width="14" stroke-linecap="round"/>
        <path d="M-344 62A344 344 0 0 0 -344 204" stroke="url(#neon)" stroke-width="12" stroke-linecap="round"/>
        <path d="M344 62A344 344 0 0 1 344 204" stroke="url(#neon)" stroke-width="12" stroke-linecap="round"/>
      </g>

      <!-- side mechanical pods -->
      <g opacity="0.96">
        <g transform="translate(-294 18)">
          <rect x="-12" y="-66" width="24" height="132" rx="10" fill="#252a30" stroke="#6f767d" stroke-width="3"/>
          <rect x="-3" y="-50" width="6" height="100" fill="#ff335f" filter="url(#glow)"/>
          <circle cx="0" cy="0" r="24" fill="#101419" stroke="#5b6269" stroke-width="4"/>
        </g>
        <g transform="translate(294 18)">
          <rect x="-12" y="-66" width="24" height="132" rx="10" fill="#252a30" stroke="#6f767d" stroke-width="3"/>
          <rect x="-3" y="-50" width="6" height="100" fill="#ff335f" filter="url(#glow)"/>
          <circle cx="0" cy="0" r="24" fill="#101419" stroke="#5b6269" stroke-width="4"/>
        </g>
      </g>

      <!-- inner housing -->
      <circle r="236" fill="#090c10" stroke="#444b52" stroke-width="10"/>
      <circle r="224" fill="#080b0f" stroke="#6a727a" stroke-width="4" opacity="0.95"/>

      <g fill="#20262c" stroke="#6c737b" stroke-width="4" opacity="0.9">
        <path d="M0 -248l18 54h-36z"/>
        <path d="M0 248l18 -54h-36z"/>
        <path d="M248 0l-54 18v-36z"/>
        <path d="M-248 0l54 18v-36z"/>
      </g>

      <!-- aperture blades -->
      <g>
        <g fill="url(#blade)" stroke="#5a6067" stroke-width="4.5">
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(0)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(36)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(72)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(108)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(144)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(180)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(216)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(252)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(288)"/>
          <path d="M-34 -6C-18 -98 30 -156 110 -188L28 -70Z" transform="rotate(324)"/>
        </g>

        <g filter="url(#glow)">
          <path d="M-8 -176C-4 -202 8 -226 32 -242" stroke="url(#neon)" stroke-width="11" stroke-linecap="round"/>
          <path d="M130 -112C162 -92 186 -66 206 -28" stroke="url(#neon)" stroke-width="11" stroke-linecap="round"/>
          <path d="M128 110C160 92 184 66 204 30" stroke="url(#neon)" stroke-width="11" stroke-linecap="round"/>
          <path d="M-128 110C-160 92 -184 64 -204 30" stroke="url(#neon)" stroke-width="11" stroke-linecap="round"/>
          <path d="M-130 -112C-160 -92 -186 -66 -206 -28" stroke="url(#neon)" stroke-width="11" stroke-linecap="round"/>
        </g>
      </g>

      <!-- center iris / eye -->
      <circle r="88" fill="#040506" stroke="#ff6a8c" stroke-width="8" filter="url(#glow)"/>
      <circle r="78" fill="url(#coreGlow)" filter="url(#soft)"/>
      <circle r="60" fill="#0a0004" opacity="0.7"/>
      <circle r="40" fill="#a60d29" opacity="0.38"/>
      <circle r="22" fill="#000000"/>
      <ellipse cx="18" cy="-18" rx="16" ry="12" fill="#ffffff" opacity="0.18" filter="url(#soft)"/>

      <!-- center flare -->
      <circle r="124" fill="url(#flare)" opacity="0.55" filter="url(#glow)"/>

      <!-- small vent rings -->
      <g opacity="0.95">
        <path d="M-182 -76h38" stroke="#60676f" stroke-width="6" stroke-linecap="round"/>
        <path d="M144 -76h38" stroke="#60676f" stroke-width="6" stroke-linecap="round"/>
        <path d="M-184 80h42" stroke="#60676f" stroke-width="6" stroke-linecap="round"/>
        <path d="M142 80h42" stroke="#60676f" stroke-width="6" stroke-linecap="round"/>
      </g>

      <!-- top notch -->
      <path d="M-34 -302h68l-8 22h-52z" fill="#13171b" stroke="#70767d" stroke-width="4"/>
      <path d="M-18 -294h36" stroke="#ff5f87" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

      <!-- lower bezel shadow -->
      <ellipse cx="0" cy="274" rx="282" ry="58" fill="url(#metalShadow)" opacity="0.7"/>
    </g>

    <!-- edge vignette -->
    <rect width="1024" height="1024" fill="url(#vignette)"/>
  </g>
</svg>
